
//Gradleプラグインの指定
plugins {

    id 'application'
    id 'java-library'
    id 'eclipse'
    id 'jacoco'

    //fat-jar作成プラグイン
    id 'com.github.johnrengelman.shadow' version '5.0.0'

    //AnnotationProcessorによって生成されたクラスをIDEに適用するプラグイン
    id "com.diffplug.eclipse.apt" version "3.37.1"
};



//==========================================================================
//依存関係
//==========================================================================



//変数定義
ext {

    //最も上にあるパッケージ名
    topPackage = "test";
}

//構成定義
configurations {

}

//ライブラリの取得元となるリポジトリを指定
repositories {

	google()
    mavenCentral()
    jcenter()
    maven
    {
        url "https://jitpack.io"
    }
}

//依存関係(ライブラリ)を指定
//MavenRepository  https://mvnrepository.com/
dependencies {

    //implementation "[Group]:[ArtifactId]:[Version]"
    //implementation fileTree(dir: 'lib', include: ["*"]);


    testImplementation 'org.junit.jupiter:junit-jupiter:5.8.2'

}



//==========================================================================
//成果物
//==========================================================================



//成果物を設定
artifacts {

    //[configurations内の名前] [作成タスク]
}



//==========================================================================
//Java
//==========================================================================



//アプリケーションの設定
application {

    //エントリーポイント
    mainClassName = "${topPackage}.Main"
}

//javaの設定
java {

    toolchain {
        //Javaのバージョンを指定
        languageVersion = JavaLanguageVersion.of(11)
    }

}

//jarの設定
jar {
    manifest {
        attributes "Main-Class": application.mainClassName
    }
}

//タスクのうち指定のクラスに一致するものに対して処理を行う
tasks.withType(JavaCompile) {

	options.encoding = 'UTF-8'
}



//==========================================================================
//Eclipse (VS Code)
//==========================================================================



eclipse {

    project {

        buildCommand 'org.eclipse.buildship.core.gradleprojectbuilder'
        natures 'org.eclipse.buildship.core.gradleprojectnature'
    }

    classpath {

        downloadJavadoc = true
        downloadSources = true

        //Gradleが管理する依存関係を伝える
        containers 'org.eclipse.buildship.core.gradleclasspathcontainer'
    }


    jdt {
        apt {
            genSrcDir = file('build/generated/sources/annotationProcessor/java/main')
            genTestSrcDir = file('build/generated/sources/annotationProcessor/java/test')
        }
    }
}

eclipse.classpath.file {

    //.classpathに変更を適用したときの動作
	whenMerged {classpath ->

        //依存関係の余計な記述を削除
        classpath.entries.removeAll {entry -> entry.kind == 'lib'}

        //テスト用リソースをライブラリとして扱う。
        //このことで、.javaファイルをそのままリソースにできる。
        for(String path : sourceSets.test.resources.srcDirs)
        {
            println path;
            def file = file(path);
            def refFile = fileReference(file);
            def lib = new org.gradle.plugins.ide.eclipse.model.Library(refFile);

            path = path.replaceAll("\\\\", "/");
            classpath.entries.removeAll {e -> e.kind == 'src' && path.endsWith(e.path)}
            classpath.entries << lib;
        }


    }
}



//==========================================================================
//テスト
//==========================================================================



tasks.named('test') {

    useJUnitPlatform()
}

jacoco{

    ext.reportsDirPath = "${buildDir}/reports/jacoco";
    reportsDirectory = file(ext.reportsDirPath)
}

jacocoTestReport.doLast {

    def url = new URL("file://${jacoco.ext.reportsDirPath}/test/html/index.html");
    java.awt.Desktop.getDesktop().browse(url.toURI());
    
}



//==========================================================================
//情報表示
//==========================================================================



//とある値の情報を表示する
ext.printObjectInfo = {obj ->

    println('==========Info Start==========');
        
    println("=====Method=====");
    obj.metaClass.getMetaMethods().forEach({o -> println(o.getSignature())});
    println("=====Property=====");
    obj.metaClass.getProperties().forEach({o ->

        print(String.format("(%s) %s", o.getType(), o.getName()));
        if(obj instanceof Class)
        {
            println();
            return;
        }

        def value = null;
        try
        {
            value = o.getProperty(obj);
            println(String.format("   =   (%s) %s", value?.class, value));
        }
        catch(Exception e)
        {
            println(" = [N/A]");
        }
    })

    println("=====Object=====");
    println(obj.class);
    println(obj);
    println('==========Info End==========');

}


//タスクを作成
task printObject {

    //タスクの処理ではなく、設定を記述する

    //最後の処理を設定
    doLast {

        rootProject.printObjectInfo(this)
    }

}



//==========================================================================
//タスク表示
//==========================================================================



//タスク実行前に、タスクの依存関係を表示する
gradle.taskGraph.whenReady {taskGraph ->

    println "Found task graph: " + taskGraph
    println "Found " + taskGraph.allTasks.size() + " tasks."

    taskGraph.allTasks.forEach {task ->

        println task
        task.dependsOn.forEach {dep ->
            println "  -dep   " + dep
        }
        
        task.mustRunAfter.each {after -> 
            println "  -after " + after
        }
    }
}







