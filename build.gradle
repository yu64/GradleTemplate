

//Gradleプラグインの指定
plugins {

    id 'application'
    id 'java-library' 

    //fat-jar作成プラグイン
    id 'com.github.johnrengelman.shadow' version '5.0.0'

};

//ライブラリの取得元となるリポジトリを指定
repositories {

	google()
    mavenCentral()
    jcenter()
}


//javaの設定
java {

    toolchain {
        //Javaのバージョンを指定
        languageVersion = JavaLanguageVersion.of(11)
    }

}

//タスクのうち指定のクラスに一致するものに対して処理を行う
tasks.withType(JavaCompile) {

	options.encoding = 'UTF-8'
}






//ソースセットの設定
sourceSets {

    //新しいソースセットの作成
    // [NewSourceSet] {
        
    // }

}

//依存関係(ライブラリ)を指定
dependencies {

    //implementation "AAAA:BBBB:VVVV"
    //implementation fileTree(dir: 'lib', include: ["*"]);
    //[newsourceset]Implementation ""
}

//アプリケーションの設定
//参考 https://docs.gradle.org/current/userguide/application_plugin.html
application {

    //エントリーポイント
    mainClass = 'test.Main'
}

//jarの設定
jar {
    manifest {
        
    }
}



//タスクを作成
//とある値の情報を表示する
task printTest {

    //タスクの処理ではなく、設定を記述する

    //最後の処理を設定
    doLast {
        println('==========Task Start==========');
        
        def obj = this.jar;
        
        println("=====Method=====");
        obj.metaClass.getMetaMethods().forEach({MetaMethod o -> println(o.getSignature())});
        println("=====Property=====");
        obj.metaClass.getProperties().forEach({MetaProperty o -> 

            print(String.format("(%s) %s", o.getType(), o.getName()));
            if(obj instanceof Class)
            {
                println();
                return;
            }

            def value = null;
            try
            {
                value = o.getProperty(obj);
                println(String.format("   =   (%s) %s", value?.class, value));
            }
            catch(Exception e)
            {
                println(" = [N/A]");
            }
        })

        println("=====Object=====");
        println(obj.class);
        println(obj);
        println('==========Task End==========');
    }

}










