

//Gradleプラグインの指定
plugins {

    id 'java-library' 

    //fat-jar作成プラグイン
    id 'com.github.johnrengelman.shadow' version '5.0.0';
};

//ライブラリの取得元となるリポジトリを指定
repositories {

	google()
    mavenCentral()
    jcenter()
}

//依存関係(ライブラリ)を指定
dependencies {

    //implementation "AAAA:BBBB:VVVV"
    //implementation fileTree(dir: 'lib', include: ["*"]);
}

//タスクを作成
task printTest {

    println('==========Task Start==========');
    
    def obj = this.sourceSets;
    
    println("=====Method=====")
    obj.metaClass.getMetaMethods().forEach({MetaMethod o -> println(o.getSignature())});
    println("=====Property=====")
    obj.metaClass.getProperties().forEach({MetaProperty o -> println(o.getType().toString() + " : " + o.getName())})
    println("=====Object=====")
    println(obj.class);
    println(obj);
    
    println('==========Task End==========');
}








//javaの設定(プラグイン)
java {

    toolchain {
        //Javaのバージョンを指定
        languageVersion = JavaLanguageVersion.of(11)
    }

}

//タスクのうち指定のクラスに一致するものに対して処理を行う
tasks.withType(JavaCompile) {

	options.encoding = 'UTF-8';
}

//jarの設定(プラグイン)
jar {
    manifest {
        
        attributes 'Main-Class': 'test.Main'
    }
}

//ソースセットの設定
sourceSets {

    //新しいソースセットの作成
    // [NewName] {
        
    // }
}














